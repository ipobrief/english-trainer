name: Build Android AAB (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.11.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.11.1/bin" >> $GITHUB_PATH

      - name: Create TWA project
        run: |
          mkdir -p twa/app/src/main/res/values

          cat > twa/settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > twa/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.9.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > twa/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.ipobrief.englishtrainer'
              compileSdk 36
              defaultConfig {
                  applicationId 'com.ipobrief.englishtrainer'
                  minSdk 21
                  targetSdk 35
                  versionCode 4
                  versionName '1.0.3'
              }
              signingConfigs {
                  release {
                      storeFile file('../android.keystore')
                      storePassword 'english123'
                      keyAlias 'android'
                      keyPassword 'english123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.6.0'
          }
          EOF

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <category android:name="android.intent.category.BROWSABLE"/>
                      <data android:scheme="https"/>
                  </intent>
                  <intent>
                      <action android:name="android.support.customtabs.action.CustomTabsService"/>
                  </intent>
              </queries>
              <application
                  android:label="영어 트레이너"
                  android:theme="@style/Theme.LauncherActivity">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:theme="@style/Theme.LauncherActivity"
                      android:exported="true">
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://ipobrief.github.io/english-trainer/"/>
                      <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="@color/colorPrimary"/>
                      <meta-data android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:value="@color/colorPrimary"/>
                      <meta-data android:name="asset_statements"
                          android:resource="@string/asset_statements"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                                android:host="ipobrief.github.io"
                                android:pathPrefix="/english-trainer"/>
                      </intent-filter>
                  </activity>
                  <service android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:exported="true" android:enabled="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0f1226</color>
              <color name="colorPrimaryDark">#0f1226</color>
              <color name="colorAccent">#3258d8</color>
          </resources>
          EOF

          cat > twa/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LauncherActivity" parent="Theme.AppCompat.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowBackground">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="asset_statements">
                  [{ \"relation\": [\"delegate_permission/common.handle_all_urls\"],
                     \"target\": { \"namespace\": \"web\",
                                   \"site\": \"https://ipobrief.github.io\"}}]
              </string>
          </resources>
          EOF

      - name: Generate Gradle wrapper
        run: |
          cd twa
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > twa/android.keystore
          echo "Keystore restored"

      - name: Build AAB
        run: |
          cd twa
          ./gradlew bundleRelease --stacktrace

      - name: Generate assetlinks.json
        run: |
          FP=$(keytool -list -v \
            -keystore twa/android.keystore -alias android \
            -storepass english123 2>/dev/null \
            | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "Fingerprint: $FP"
          printf '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.ipobrief.englishtrainer","sha256_cert_fingerprints":["%s"]}}]' "$FP" > assetlinks.json
          cat assetlinks.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: english-trainer-release
          path: |
            twa/app/build/outputs/bundle/release/app-release.aab
            twa/android.keystore
            assetlinks.json
          retention-days: 30
