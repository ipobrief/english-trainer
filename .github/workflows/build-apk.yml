name: Build Android AAB (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create TWA Android project
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/xml
          mkdir -p twa/gradle/wrapper

          # settings.gradle
          cat > twa/settings.gradle << 'EOF'
          include ':app'
          EOF

          # root build.gradle
          cat > twa/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # app/build.gradle
          cat > twa/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'io.github.ipobrief.englishtrainer'
              compileSdk 34
              defaultConfig {
                  applicationId 'io.github.ipobrief.englishtrainer'
                  minSdk 19
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              signingConfigs {
                  release {
                      storeFile file('../android.keystore')
                      storePassword 'english123'
                      keyAlias 'android'
                      keyPassword 'english123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest.xml
          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application
                  android:label="@string/appName"
                  android:theme="@android:style/Theme.NoTitleBar">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://ipobrief.github.io/english-trainer/"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="@color/colorPrimary"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:value="@color/colorPrimary"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:value="@color/colorPrimary"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:value="@color/colorPrimary"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                                android:host="ipobrief.github.io"
                                android:pathPrefix="/english-trainer"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:exported="true"
                      android:enabled="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          # strings.xml
          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="appName">영어 트레이너</string>
          </resources>
          EOF

          # colors.xml
          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0f1226</color>
          </resources>
          EOF

          # gradle wrapper
          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cd twa
          gradle wrapper --gradle-version 8.4

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore twa/android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass english123 \
            -keypass english123 \
            -dname "CN=EnglishTrainer,O=ipobrief,C=KR"

      - name: Build AAB
        run: |
          cd twa
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Generate assetlinks.json
        run: |
          FP=$(keytool -list -v \
            -keystore twa/android.keystore \
            -alias android \
            -storepass english123 2>/dev/null \
            | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "Fingerprint: $FP"
          printf '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"io.github.ipobrief.englishtrainer","sha256_cert_fingerprints":["%s"]}}]' "$FP" > assetlinks.json
          cat assetlinks.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: english-trainer-release
          path: |
            twa/app/build/outputs/bundle/release/app-release.aab
            twa/android.keystore
            assetlinks.json
          retention-days: 30
