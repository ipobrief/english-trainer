name: Build Android AAB (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass english123 \
            -keypass english123 \
            -dname "CN=영어트레이너, OU=English, O=ipobrief, L=Seoul, ST=Seoul, C=KR"

      - name: Init TWA from manifest
        run: |
          bubblewrap init --manifest https://ipobrief.github.io/english-trainer/manifest.json
        env:
          BUBBLEWRAP_SKIP_UPDATE: "true"
          CI: "true"

      - name: Copy keystore & patch signing config
        run: |
          cp android.keystore twa/android.keystore
          cd twa
          # twa-manifest.json 에 서명 정보 주입
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.signingKey = { path: './android.keystore', alias: 'android' };
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "

      - name: Build AAB
        run: |
          cd twa
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ./android.keystore \
            --signingKeyAlias android \
            --ks-pass pass:english123 \
            --key-pass pass:english123
        env:
          BUBBLEWRAP_SKIP_UPDATE: "true"

      - name: Generate assetlinks.json
        run: |
          FINGERPRINT=$(keytool -list -v \
            -keystore android.keystore \
            -alias android \
            -storepass english123 2>/dev/null \
            | grep "SHA256:" | head -1 | awk '{print $2}')
          echo "SHA256 Fingerprint: $FINGERPRINT"
          cat > assetlinks.json << EOF
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "io.github.ipobrief.englishtrainer",
              "sha256_cert_fingerprints": ["$FINGERPRINT"]
            }
          }]
          EOF
          cat assetlinks.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: english-trainer-release
          path: |
            twa/app-release-bundle.aab
            android.keystore
            assetlinks.json
          retention-days: 30
